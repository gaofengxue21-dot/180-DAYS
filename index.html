<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>星河朝圣 | 考研倒计时打卡</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030611;
            --text-color: #e2e8f0;
            --muted-color: #64748b;
            --accent-gold: #f59e0b;
            --panel-bg: rgba(15, 23, 42, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); overflow: hidden; height: 100vh; width: 100vw; font-family: 'Noto Serif SC', serif; color: var(--text-color); }
        
        #space-bg { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, #0d1527 0%, #030611 100%); z-index: 1; }

        .app-container { height: 100vh; display: flex; flex-direction: column; position: relative; z-index: 2; }
        
        header { height: 60px; background: rgba(3, 6, 17, 0.8); display: flex; justify-content: space-between; align-items: center; padding: 0 24px; border-bottom: 1px solid var(--border-color); backdrop-filter: blur(10px); z-index: 10; }
        header h1 { font-family: 'Cinzel', serif; font-size: 18px; letter-spacing: 2px; color: var(--accent-gold); }
        .countdown { font-size: 13px; color: var(--muted-color); letter-spacing: 1px; }
        
        .view-wrapper { flex: 1; position: relative; overflow: hidden; }
        .view-panel { position: absolute; inset: 0; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; display: flex; flex-direction: column; }
        .view-panel.active { opacity: 1; pointer-events: auto; }

        .path-scroll-container { flex: 1; overflow-y: auto; scroll-behavior: smooth; position: relative; padding-bottom: 120px; }
        .path-scroll-container::-webkit-scrollbar { display: none; }
        
        .map-box { 
            position: relative; 
            width: 100%; 
            max-width: 850px; 
            margin: 0 auto; 
            box-shadow: 0 0 50px rgba(0,0,0,0.8); 
            line-height: 0; 
        }
        
        #map-bg-img { width: 100%; height: auto; display: block; }

        .water-ripple { position: absolute; inset: 0; background: linear-gradient(180deg, transparent 0%, rgba(135, 206, 235, 0.15) 50%, transparent 100%); background-size: 100% 200%; mix-blend-mode: color-dodge; pointer-events: none; animation: flow 8s linear infinite; z-index: 2; }
        @keyframes flow { 0% { background-position: 0% 0%; } 100% { background-position: 0% 100%; } }

        .star-node { position: absolute; width: 12px; height: 12px; border-radius: 50%; transform: translate(-50%, -50%); transition: all 0.5s; z-index: 4; background: rgba(255,255,255,0.3); cursor: pointer; }
        .star-node.active { background: #fff; box-shadow: 0 0 12px #fff, 0 0 20px var(--accent-gold); }
        .star-date { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); font-size: 10px; color: rgba(255,255,255,0.7); white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.3s; font-family: sans-serif;}
        .star-node.active .star-date { opacity: 1; }

        /* 气泡系统：强制居中、动态上下避让、5秒绝美渐隐 */
        .toast-msg { 
            position: fixed; 
            background: rgba(15, 23, 42, 0.95); 
            border: 1px solid var(--accent-gold); 
            color: #fff; 
            padding: 16px 28px; 
            border-radius: 12px; 
            font-size: 15px; 
            line-height: 1.8; 
            letter-spacing: 2px; 
            text-align: center; 
            backdrop-filter: blur(10px); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); 
            z-index: 200; 
            
            /* 居中核心与渐变控制 */
            left: 50%;
            transform: translateX(-50%);
            width: max-content;
            max-width: 80%;
            opacity: 0; 
            visibility: hidden;
            /* 消失时：透明度耗时 1.5 秒慢慢淡出 */
            transition: opacity 1.5s ease-out, visibility 1.5s ease-out, top 0.6s cubic-bezier(0.25, 1, 0.5, 1); 
        }
        .toast-msg.show { 
            opacity: 1; 
            visibility: visible;
            /* 出现时：迅速浮现 0.3 秒 */
            transition: opacity 0.3s ease-in, top 0.6s cubic-bezier(0.25, 1, 0.5, 1); 
        }

        /* 悬停微型提示 */
        .tooltip { position: fixed; background: rgba(15, 23, 42, 0.95); border: 1px solid var(--accent-gold); color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 13px; line-height: 1.6; letter-spacing: 1px; pointer-events: none; opacity: 0; z-index: 100; transition: opacity 0.2s; transform: translate(-50%, -120%); box-shadow: 0 5px 15px rgba(0,0,0,0.5); backdrop-filter: blur(5px); white-space: nowrap; }
        .tooltip.show { opacity: 1; }

        /* 回归纯净的轻功滑行与呼吸悬浮，不再有任何形变压缩 */
        #avatar { 
            position: absolute; 
            width: 80px; 
            height: auto; 
            transform: translate(-50%, -90%);
            z-index: 10; 
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.4)); 
            transform-origin: bottom center; 
            transition: top 0.8s cubic-bezier(0.25, 1, 0.5, 1), left 0.8s ease-in-out; 
            animation: idleBreath 3s ease-in-out infinite;
        }

        @keyframes idleBreath {
            0%, 100% { transform: translate(-50%, -90%); }
            50% { transform: translate(-50%, -93%); }
        }

        .action-overlay { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 20; width: 90%; max-width: 400px; display: flex; gap: 12px; align-items: center; justify-content: center; transition: opacity 0.3s;}
        .btn-punch { flex: 1; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid var(--accent-gold); color: var(--accent-gold); padding: 16px 20px; font-size: 15px; letter-spacing: 4px; border-radius: 30px; cursor: pointer; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4); transition: all 0.3s ease; font-family: 'Noto Serif SC', serif; }
        .btn-punch:hover { background: var(--accent-gold); color: #000; box-shadow: 0 0 20px var(--accent-glow); }
        .btn-undo { background: rgba(15, 23, 42, 0.8); border: 1px solid var(--muted-color); color: var(--muted-color); padding: 16px; border-radius: 30px; cursor: pointer; font-size: 14px; backdrop-filter: blur(5px); transition: all 0.3s; white-space: nowrap; }
        .btn-undo:hover { color: #fff; border-color: #fff; }
        .btn-audio { width: 50px; height: 50px; border-radius: 50%; background: rgba(15, 23, 42, 0.8); border: 1px solid var(--border-color); color: var(--muted-color); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); transition: all 0.3s; flex-shrink: 0; }
        .btn-audio.playing { color: var(--accent-gold); border-color: var(--accent-gold); box-shadow: 0 0 15px var(--accent-glow); }

        /* 开发模式UI：专属最后10点编辑 */
        .dev-overlay { position: fixed; top: 10%; left: 50%; transform: translateX(-50%); background: rgba(20, 30, 50, 0.95); padding: 20px; border-radius: 12px; border: 2px solid #ef4444; color: #fff; z-index: 999; display: none; text-align: center; width: 90%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .dev-overlay.active { display: block; }
        .dev-point { position: absolute; width: 14px; height: 14px; background: #ef4444; border: 2px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); z-index: 100; pointer-events: none; box-shadow: 0 0 10px #ef4444;}
        .btn-dev { margin-top: 15px; padding: 10px 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; background: #3b82f6; color: white;}
        .btn-dev.cancel { background: #64748b; margin-left: 10px;}

        /* 树洞功能区 */
        .treehole-container { flex: 1; overflow-y: auto; padding: 24px; max-width: 600px; margin: 0 auto; width: 100%; }
        .treehole-container::-webkit-scrollbar { display: none; }
        .publish-card { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; margin-bottom: 32px; backdrop-filter: blur(8px); }
        .publish-card textarea { width: 100%; height: 100px; background: transparent; border: none; resize: none; outline: none; color: var(--text-color); font-family: 'Noto Serif SC', serif; font-size: 14px; line-height: 1.6; margin-bottom: 16px; }
        .publish-actions { display: flex; justify-content: space-between; align-items: center; }
        .image-uploader { position: relative; cursor: pointer; color: var(--muted-color); font-size: 13px; display: flex; align-items: center; gap: 6px; transition: color 0.3s; }
        .image-uploader:hover { color: var(--text-color); }
        .image-uploader input { display: none; }
        .img-preview-badge { display: none; font-size: 11px; color: var(--accent-gold); background: rgba(245, 158, 11, 0.1); padding: 2px 8px; border-radius: 10px; margin-left: 8px; }
        .btn-submit { background: var(--text-color); color: var(--bg-color); border: none; padding: 8px 24px; font-size: 13px; font-weight: 500; border-radius: 20px; cursor: pointer; transition: opacity 0.3s;}
        .btn-submit:hover { opacity: 0.9; }
        
        .timeline { position: relative; padding-left: 20px; padding-top: 20px;}
        .timeline::before { content: ""; position: absolute; left: 0; top: 25px; bottom: 0; width: 1px; background: var(--border-color); }
        .feed-item { position: relative; margin-bottom: 40px; }
        .feed-item::before { content: ""; position: absolute; left: -24px; top: 6px; width: 9px; height: 9px; background: var(--bg-color); border: 2px solid var(--muted-color); border-radius: 50%; }
        .feed-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .feed-date { font-size: 12px; color: var(--muted-color); }
        .feed-actions-btn { display: flex; gap: 12px; font-size: 12px; }
        .feed-actions-btn span { cursor: pointer; color: var(--muted-color); transition: color 0.3s; }
        .feed-actions-btn span:hover { color: var(--accent-gold); }
        .feed-content { font-size: 14px; line-height: 1.8; color: #cbd5e1; white-space: pre-wrap; margin-bottom: 12px;}
        .feed-img { max-width: 100%; max-height: 300px; border-radius: 6px; object-fit: cover; border: 1px solid var(--border-color); }

        .tab-bar { height: 64px; border-top: 1px solid var(--border-color); background: rgba(3, 6, 17, 0.9); backdrop-filter: blur(10px); display: flex; z-index: 20; }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted-color); cursor: pointer; transition: color 0.3s; gap: 4px; }
        .tab-item.active { color: var(--text-color); }
        .tab-icon { font-size: 18px; }
        .tab-label { font-size: 11px; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div id="space-bg"></div>
    <audio id="audio-bgm" src="audio/bgm.mp3" loop></audio>
    <audio id="audio-water" src="audio/water.mp3" loop></audio>

    <div class="toast-msg" id="toast"></div>
    <div class="tooltip" id="hover-tooltip"></div>

    <!-- 专属：最后10步登阶微调界面 -->
    <div class="dev-overlay" id="dev-overlay">
        <h3>绘制最后 10 步登阶轨</h3>
        <p style="font-size:12px; margin-top:10px; color:#94a3b8; line-height:1.6;">前 170 步主星轨已按算法完美生成。<br>请在顶端台阶连续点击 <b>10 次</b>，规划你迈向终点的路径。最后一下务必点在大门中央！</p>
        <p style="margin-top:10px; font-size:14px; color:var(--accent-gold);">已标记：<span id="dev-count">0</span> / 10 步</p>
        <button class="btn-dev reset" onclick="resetDefaultLast10()" style="background: #ef4444;">恢复默认对齐</button>
        <button class="btn-dev cancel" onclick="exitDevMode()">取消修改</button>
    </div>

    <div class="app-container">
        <header>
            <h1>SHAMORE</h1>
            <div style="display:flex; align-items:center; gap:15px;">
                <div class="countdown" id="progress-text">已点亮 0 / 180 耀星</div>
                <!-- 点击它启动微调 -->
                <div style="cursor:pointer; font-size:18px;" onclick="enterDevMode()" title="微调最后登阶轨">⚙️</div>
            </div>
        </header>

        <div class="view-wrapper">
            <div id="view-path" class="view-panel active">
                <div class="path-scroll-container" id="scroll-box">
                    <div class="map-box" id="map-box">
                        <img src="images/bg.png" id="map-bg-img" alt="背景">
                        <div class="water-ripple"></div>
                        <img src="images/avatar.png" id="avatar" alt="主角">
                    </div>
                </div>
                <div class="action-overlay" id="action-overlay">
                    <button class="btn-undo" id="undo-trigger">撤销</button>
                    <button class="btn-punch" id="punch-trigger">跃向星辰</button>
                    <button class="btn-audio" id="audio-trigger">🎵</button> 
                </div>
            </div>

            <div id="view-treehole" class="view-panel">
                <div class="treehole-container">
                    <div class="publish-card">
                        <textarea id="post-input" placeholder="写下今天的复盘、感悟或碎碎念..."></textarea>
                        <div class="publish-actions">
                            <label class="image-uploader">
                                <span>📷 添加今日定格</span>
                                <span class="img-preview-badge" id="img-badge">已选择</span>
                                <input type="file" id="file-input" accept="image/*">
                            </label>
                            <button class="btn-submit" id="submit-trigger">发布</button>
                        </div>
                    </div>
                    <div class="timeline" id="feed-flow"></div>
                </div>
            </div>
        </div>

        <nav class="tab-bar">
            <div class="tab-item active" onclick="switchTab('path')">
                <div class="tab-icon">🌌</div>
                <div class="tab-label">星空之路</div>
            </div>
            <div class="tab-item" onclick="switchTab('treehole')">
                <div class="tab-icon">🍃</div>
                <div class="tab-label">私人树洞</div>
            </div>
        </nav>
    </div>

    <script>
        const TOTAL_STARS = 180;
        let currentProgress = parseInt(localStorage.getItem('pku_stars_count')) || 0;
        let starRecords = JSON.parse(localStorage.getItem('pku_star_records')) || [];
        let diaryData = JSON.parse(localStorage.getItem('shamore_diary_data')) || []; 
        let selectedImgBase64 = "";

        if (currentProgress > 0 && starRecords.length === 0) {
            for(let i = 0; i < currentProgress; i++) {
                starRecords.push({ date: "此前记录", quote: "路虽远，行则将至。" });
            }
        }
        
        // 沿用此前180句绝不重样的大型名言库

        // --- 核心优化：智能避让中轴居中气泡，5秒缓慢渐隐 ---
        let toastTimeout;
        function showToast(text, yPercent) {
            const toast = document.getElementById('toast');
            toast.innerText = text;
            
            // 上下智能避让判断：
            // 如果女侠位置偏低(数字大，下半屏)，气泡就高高浮现在天际(15%)
            // 如果女侠位置偏高(数字小，上半屏)，气泡就浮现在谷底深处(80%)
            if (yPercent > 50) {
                toast.style.top = '15%'; 
            } else {
                toast.style.top = '80%';
            }
            
            toast.classList.add('show');
            
            // 清除旧定时器，重新计时 5 秒后消失
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => { 
                toast.classList.remove('show'); 
            }, 5000); 
        }

        // --- 星轨生成：前170智能疏密S波，最后10专属微调登阶 ---
        const mapBox = document.getElementById('map-box');
        const bgImg = document.getElementById('map-bg-img');
        const starCoordinates = []; 
        let customLast10 = JSON.parse(localStorage.getItem('shamore_last10_points'));

        function calculateStars() {
            starCoordinates.length = 0;
            
            for (let i = 0; i < TOTAL_STARS; i++) {
                let percentX, percentY;

                if (i < 170) {
                    // 前 170 颗：引入谐波纠正
                    // 在平滑斜线处排布更多星辰，在波峰波谷的大转弯处自动变疏，保留蜿蜒质感
                    const progressRatio = i / 170; 
                    const theta = i * 0.185;
                    percentY = 94 - (progressRatio * (94 - 20)) + Math.sin(theta * 2) * 1.2; 
                    percentX = 50 + Math.sin(theta) * 36; 
                } else {
                    // 最后 10 颗：用户自定义登阶，如果没有定义，生成一条紧密的向心垂线
                    const last10Index = i - 170;
                    if (customLast10 && customLast10[last10Index]) {
                        percentX = customLast10[last10Index].x;
                        percentY = customLast10[last10Index].y;
                    } else {
                        percentX = 50; 
                        percentY = 19 - (last10Index * 1.2); // 直达约 8% 大门正心
                    }
                }
                starCoordinates.push({x: percentX, y: percentY});
            }
        }

        function renderStarNodes() {
            document.querySelectorAll('.star-node').forEach(e => e.remove());
            calculateStars();
            
            for (let i = 0; i < TOTAL_STARS; i++) {
                const node = document.createElement('div');
                node.className = 'star-node';
                node.id = `star-${i}`;
                node.style.left = `${starCoordinates[i].x}%`;
                node.style.top = `${starCoordinates[i].y}%`;
                
                node.addEventListener('mouseenter', (e) => {
                    if (i < currentProgress && starRecords[i]) {
                        const rect = node.getBoundingClientRect();
                        tooltip.innerText = starRecords[i].quote;
                        tooltip.style.left = `${rect.left + rect.width / 2}px`;
                        tooltip.style.top = `${rect.top}px`;
                        tooltip.classList.add('show');
                    }
                });
                node.addEventListener('mouseleave', () => { tooltip.classList.remove('show'); });
                mapBox.appendChild(node);
            }
        }

        // --- 开发者协作：微调最后 10 步 ---
        let isDevMode = false;
        let tempLast10 = [];

        function enterDevMode() {
            isDevMode = true;
            document.getElementById('dev-overlay').classList.add('active');
            document.getElementById('action-overlay').style.opacity = '0';
            tempLast10 = [];
            document.getElementById('dev-count').innerText = "0";

            for(let i = 170; i < 180; i++) {
                let el = document.getElementById(`star-${i}`);
                if(el) el.style.display = 'none';
            }
            document.getElementById('avatar').style.display = 'none';
            // 自动滚动到大门处
            document.getElementById('scroll-box').scrollTo({ top: 0, behavior: 'smooth' });
        }

        function exitDevMode() {
            isDevMode = false;
            document.getElementById('dev-overlay').classList.remove('active');
            document.getElementById('action-overlay').style.opacity = '1';
            document.querySelectorAll('.dev-point').forEach(e => e.remove());
            document.getElementById('avatar').style.display = 'block';
            renderStarNodes();
            updateGameScene();
        }

        function resetDefaultLast10() {
            localStorage.removeItem('shamore_last10_points');
            customLast10 = null;
            exitDevMode();
            alert("已恢复默认的直线收束登阶。");
        }

        mapBox.addEventListener('click', (e) => {
            if(!isDevMode || tempLast10.length >= 10) return;
            const rect = mapBox.getBoundingClientRect();
            const yPercent = ((e.clientY - rect.top) / rect.height) * 100;
            const xPercent = ((e.clientX - rect.left) / rect.width) * 100;
            
            tempLast10.push({x: xPercent, y: yPercent});
            document.getElementById('dev-count').innerText = tempLast10.length;
            
            const pt = document.createElement('div');
            pt.className = 'dev-point';
            pt.style.left = `${xPercent}%`;
            pt.style.top = `${yPercent}%`;
            mapBox.appendChild(pt);

            if(tempLast10.length === 10) {
                setTimeout(() => {
                    customLast10 = [...tempLast10];
                    localStorage.setItem('shamore_last10_points', JSON.stringify(customLast10));
                    alert("专属最后10步已生成并永久保存！");
                    exitDevMode();
                }, 300);
            }
        });

        // 确保图片加载完成后再计算滚动，防止错位
        bgImg.onload = () => {
            renderStarNodes();
            updateGameScene();
            setTimeout(() => {
                const container = document.getElementById('scroll-box');
                container.scrollTop = container.scrollHeight;
                scrollToAvatar();
            }, 300);
        };
        if (bgImg.complete) {
            renderStarNodes();
            updateGameScene();

        function scrollToAvatar() {
            const container = document.getElementById('scroll-box');
            const avatar = document.getElementById('avatar');
            if(!avatar || avatar.style.display === 'none') return;
            const avatarY = (parseFloat(avatar.style.top) / 100) * mapBox.clientHeight;
            container.scrollTo({ top: avatarY - (container.clientHeight / 2), behavior: 'smooth' });
        }

        function updateGameScene() {
            document.getElementById('progress-text').innerText = `已点亮 ${currentProgress} / ${TOTAL_STARS} 步`;
            
            for (let i = 0; i < TOTAL_STARS; i++) {
                const el = document.getElementById(`star-${i}`);
                if(!el) continue;
                if (i < currentProgress) { 
                    el.classList.add('active'); 
                    let dateSpan = el.querySelector('.star-date');
                    if(!dateSpan) {
                        dateSpan = document.createElement('div');
                        dateSpan.className = 'star-date';
                        el.appendChild(dateSpan);
                    }
                    dateSpan.innerText = starRecords[i]?.date || '';
                } else { 
                    el.classList.remove('active'); 
                    const dateSpan = el.querySelector('.star-date');
                    if(dateSpan) el.removeChild(dateSpan);
                }
            }

            const targetIndex = currentProgress === 0 ? 0 : currentProgress - 1;
            if(starCoordinates.length > 0) {
                const pos = starCoordinates[targetIndex]; 
                const avatar = document.getElementById('avatar');
                // 纯净位移，配合 CSS transition 实现仙气滑行
                avatar.style.left = `${pos.x}%`;
                avatar.style.top = `${pos.y}%`;
            }
        }

        document.getElementById('punch-trigger').addEventListener('click', () => {
            if (!audioPlaying) toggleAudio();
            if (currentProgress >= TOTAL_STARS) { showToast('推开大门，去拥抱你的清华！', 10); return; }
            
            const specificQuote = allQuotes[currentProgress] || "前路漫漫，步履不停。";
            const now = new Date();
            const dateStr = `${now.getMonth() + 1}/${now.getDate()}`;

            starRecords[currentProgress] = { date: dateStr, quote: specificQuote };
            currentProgress++;
            
            localStorage.setItem('pku_stars_count', currentProgress);
            localStorage.setItem('pku_star_records', JSON.stringify(starRecords));
            
            updateGameScene();
            
            // 获取最新点的 Y 坐标，传递给智能气泡
            const newPos = starCoordinates[currentProgress - 1];
            showToast(specificQuote, newPos.y);

            setTimeout(scrollToAvatar, 400); 
        });

        document.getElementById('undo-trigger').addEventListener('click', () => {
            if (currentProgress > 0) {
                currentProgress--;
                starRecords.pop();
                localStorage.setItem('pku_stars_count', currentProgress);
                localStorage.setItem('pku_star_records', JSON.stringify(starRecords));
                
                updateGameScene();
                setTimeout(scrollToAvatar, 200);
                showToast("已退回，允许自己偶尔停下调整。", 50);
            } else {
                showToast("已经在起点了，向前走吧！", 50);
            }
        });

        // --- 私人树洞区逻辑（附带编辑/删除） ---
        const fileInput = document.getElementById('file-input');
        const imgBadge = document.getElementById('img-badge');

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (event) {
                selectedImgBase64 = event.target.result;
                imgBadge.style.display = 'inline-block';
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('submit-trigger').addEventListener('click', () => {
            const text = document.getElementById('post-input').value.trim();
            if (!text && !selectedImgBase64) { showToast('总要留下点什么再发布吧...', 50); return; }
            
            const now = new Date();
            const timeString = `${now.getFullYear()}.${String(now.getMonth() + 1).padStart(2, '0')}.${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
            
            diaryData.unshift({ id: Date.now(), date: timeString, content: text, image: selectedImgBase64 });
            localStorage.setItem('shamore_diary_data', JSON.stringify(diaryData));
            
            document.getElementById('post-input').value = "";
            fileInput.value = "";
            selectedImgBase64 = "";
            imgBadge.style.display = 'none';
            
            renderTimeline();
        });

        window.deletePost = function(id) {
            if(confirm("确定要删除这条定格吗？")) {
                diaryData = diaryData.filter(d => d.id !== id);
                localStorage.setItem('shamore_diary_data', JSON.stringify(diaryData));
                renderTimeline();
            }
        }

        window.editPost = function(id) {
            let post = diaryData.find(d => d.id === id);
            if(!post) return;
            let newContent = prompt("修改你的感悟：", post.content);
            if(newContent !== null && newContent.trim() !== "") {
                post.content = newContent.trim();
                localStorage.setItem('shamore_diary_data', JSON.stringify(diaryData));
                renderTimeline();
            }
        }

        function renderTimeline() {
            const flow = document.getElementById('feed-flow');
            flow.innerHTML = "";
            if (diaryData.length === 0) {
                flow.innerHTML = `<div style="text-align:center; color:var(--muted-color); font-size:13px; padding-top:40px;">这里空空如也，在此记下第一缕心绪吧。</div>`;
                return;
            }
            diaryData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'feed-item';
                let imgHtml = item.image ? `<img src="${item.image}" class="feed-img" onclick="window.open(this.src)">` : '';
                card.innerHTML = `
                    <div class="feed-header">
                        <div class="feed-date">${item.date}</div>
                        <div class="feed-actions-btn">
                            <span onclick="editPost(${item.id})">✏️ 编辑</span>
                            <span onclick="deletePost(${item.id})">🗑️ 删除</span>
                        </div>
                    </div>
                    <div class="feed-content">${item.content}</div>
                    ${imgHtml}
                `;
                flow.appendChild(card);
            });
        }

        window.addEventListener('load', () => {
            renderTimeline();
        });
    </script>
</body>
</html>
